/* Generate PNG home-screen icons at runtime. iOS Safari prefers PNG for
   apple-touch-icon (SVG support is patchy on older iOS), and Android
   maskable icons render more reliably from PNG. This runs synchronously
   on every page load, well before any "Add to Home Screen" tap. */
(function(){
  function buildSVG(size){
    // Pure-shape kungfu icon: red headband + white gi with V-neck + black
    // belt. No fonts or emoji, so it rasterises to PNG identically on every
    // device. ViewBox lets all sizes share one set of coordinates.
    return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 100 100">'+
      '<rect width="100" height="100" rx="22" fill="#f59e0b"/>'+
      // Red headband + trailing ribbons
      '<rect x="14" y="8" width="72" height="10" fill="#dc2626"/>'+
      '<rect x="14" y="15" width="72" height="3" fill="#7f1d1d"/>'+
      '<polygon points="14,18 8,28 18,20" fill="#dc2626"/>'+
      '<polygon points="86,18 92,28 82,20" fill="#dc2626"/>'+
      // White gi body with V-neck cut showing amber underneath
      '<rect x="18" y="28" width="64" height="56" fill="#f8fafc"/>'+
      '<polygon points="38,28 50,54 62,28" fill="#f59e0b"/>'+
      // Right lapel crossover
      '<path d="M 50 54 L 62 28 L 78 28 L 78 84 L 50 84 Z" fill="#f8fafc"/>'+
      '<line x1="38" y1="28" x2="50" y2="54" stroke="#cbd5e1" stroke-width="1.5"/>'+
      '<line x1="50" y1="54" x2="50" y2="84" stroke="#cbd5e1" stroke-width="1.5"/>'+
      // Black belt + knot + trailing tail
      '<rect x="18" y="62" width="64" height="10" fill="#0b0b0b"/>'+
      '<rect x="44" y="58" width="12" height="16" fill="#0b0b0b"/>'+
      '<polygon points="42,72 38,82 47,72" fill="#0b0b0b"/>'+
      '</svg>';
  }
  function rasterize(size){
    return new Promise(function(resolve){
      var img = new Image();
      img.onload = function(){
        try{
          var c = document.createElement("canvas");
          c.width = size; c.height = size;
          c.getContext("2d").drawImage(img, 0, 0, size, size);
          resolve(c.toDataURL("image/png"));
        }catch(e){ resolve(null); }
      };
      img.onerror = function(){ resolve(null); };
      img.src = "data:image/svg+xml;base64," + btoa(buildSVG(size));
    });
  }
  function addAppleIcon(href, sizes){
    var l = document.createElement("link");
    l.rel = "apple-touch-icon";
    if(sizes) l.sizes = sizes;
    l.href = href;
    document.head.appendChild(l);
  }
  Promise.all([rasterize(180), rasterize(192), rasterize(512), rasterize(167), rasterize(152)]).then(function(pngs){
    var p180=pngs[0], p192=pngs[1], p512=pngs[2], p167=pngs[3], p152=pngs[4];
    // Apple touch icons for iPhone and iPad sizes
    if(p180) addAppleIcon(p180, "180x180");
    if(p167) addAppleIcon(p167, "167x167");
    if(p152) addAppleIcon(p152, "152x152");
    // Swap the manifest to one with PNG icons (Android prefers PNG for maskable).
    if(p192 && p512){
      var m = {name:"Maths Battle Quest",short_name:"Maths Battle",
        description:"Train your mind. Sharpen your focus. Defeat the Maths Masters.",
        start_url:"./",scope:"./",display:"standalone",orientation:"portrait",

          {src:p512,sizes:"512x512",type:"image/png",purpose:"any"},
          {src:p512,sizes:"512x512",type:"image/png",purpose:"maskable"}
        ]};
      try{
        var blob = new Blob([JSON.stringify(m)], {type:"application/manifest+json"});
        var url = URL.createObjectURL(blob);
        var existing = document.getElementById("mbq-manifest");
        if(existing) existing.href = url;
      }catch(e){}
    }
  });
})();

<!--
  ==========================================================================
  MATHS ISLAND BATTLE  (Bruce-Lee style Year 3 Maths fighter)
  --------------------------------------------------------------------------
  * 100% self-contained. No Node, no internet, no build. Just open this file.
  * SAFE MODE: data stays in this browser only (localStorage). No accounts.
  * 5 ISLANDS, unlocked by POINTS (⭐) you win in fights. Each island has
    the SAME 9 topic levels (always playable once the island is open).
  * Each island raises the QUESTION DIFFICULTY (e.g. 3-digit sums become
    4–5 digit sums, bigger tables, finer clock times, harder word problems).
  * Questions are generated by the GENERATORS section -> tweak the number
    ranges there to make any level easier/harder.
  ==========================================================================
-->
<style>
  :root{color-scheme:light dark;--ink:#0f172a;--muted:#64748b;--card:#fff;--gold:#f59e0b;--good:#16a34a;--bad:#ef4444;--radius:22px;--tap:54px;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  html,body{height:100%;color-scheme:light dark;}
  body{font-family:"Baloo 2","Comic Sans MS","Segoe UI",system-ui,sans-serif;color:var(--ink);
    user-select:none;-webkit-user-select:none;background-color:#ffe7ef;
    background:linear-gradient(160deg,#ffe7ef,#e9f0ff 50%,#e6f7f0);background-attachment:fixed;overflow-x:hidden;}
  /* ---- DARK THEME — always on, so it looks the same on every phone
         (Samsung Internet / Chrome dark mode can't mangle it) ---- */
  :root{--ink:#eef2f7;--muted:#9aa6b8;--card:#222b3c;}
  body{background-color:#141a2b !important;
    background:linear-gradient(160deg,#1d1736,#121b2c 55%,#10211d) !important;color:#eef2f7 !important;}
  .card{background:#222b3c !important;color:#eef2f7 !important;}
  .lvl,.tile,.shop-item,.chip,.seg button,.opt{background:#222b3c !important;color:#eef2f7 !important;}
  .opt.good{background:#14532d !important;border-color:#16a34a !important;}
  .opt.bad{background:#7f1d1d !important;border-color:#ef4444 !important;}
  .hud{background:rgba(34,43,60,.95) !important;color:#eef2f7 !important;}
  .muted{color:#9aa6b8 !important;}
  .ans-input{background:#1a2233 !important;color:#eef2f7 !important;}
  .slot{background:#2a3346 !important;}
  .timerbar,.bar,.hpbar{background:#33405a !important;}
  .shop-item.eq{background:#14532d !important;border-color:#16a34a !important;}
  .stage{background:linear-gradient(#3a4a7c 0%,#5566a3 50%,#cdaa7a 50%,#bd9a68 100%) !important;}
  .floor{background:repeating-linear-gradient(90deg,#c19a63,#c19a63 26px,#b48a52 26px,#b48a52 52px) !important;}
  #app{max-width:920px;margin:0 auto;min-height:100vh;min-height:100dvh;padding:14px 14px calc(20px + env(safe-area-inset-bottom));}
  h1{font-size:clamp(24px,6vw,40px);} h2{font-size:clamp(18px,4.6vw,26px);}
  .muted{color:var(--muted);}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:0 14px 30px rgba(0,0,0,.22);}
  .row{display:flex;gap:10px;align-items:center;} .wrap{display:flex;flex-wrap:wrap;gap:10px;}
  .btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:800;color:#fff;
    background:linear-gradient(180deg,#f59e0b,#b45309);padding:14px 20px;border-radius:16px;font-size:17px;
    min-height:var(--tap);box-shadow:0 6px 0 #7c2d12;transition:transform .08s;}
  .btn:active{transform:translateY(3px);box-shadow:0 3px 0 #7c2d12;} .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn.dark{background:linear-gradient(180deg,#334155,#0f172a);box-shadow:0 6px 0 #020617;}
  .btn.green{background:linear-gradient(180deg,#22c55e,#15803d);box-shadow:0 6px 0 #052e16;}
  .btn.red{background:linear-gradient(180deg,#f87171,#b91c1c);box-shadow:0 6px 0 #450a0a;}
  .btn.ghost{background:rgba(255,255,255,.9);color:#334155;box-shadow:0 5px 0 rgba(0,0,0,.12);}
  .btn.sm{padding:9px 13px;font-size:14px;min-height:0;border-radius:12px;box-shadow:0 4px 0 rgba(0,0,0,.2);}
  .hud{display:flex;justify-content:space-between;align-items:center;gap:8px;background:rgba(255,255,255,.92);
    border-radius:18px;padding:8px 12px;box-shadow:0 8px 18px rgba(0,0,0,.15);}
  .pill{display:inline-flex;align-items:center;gap:5px;background:#fff7e6;border:2px solid #fcd34d;color:#92400e;
    border-radius:999px;padding:5px 11px;font-weight:800;font-size:13px;}
  .pill.coin{background:#fef9c3;border-color:#fde047;color:#854d0e;}
  .pill.star{background:#ffe4e6;border-color:#fecdd3;color:#9f1239;}
  .grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .grid.three{grid-template-columns:1fr 1fr;}
  @media(min-width:560px){.grid.two{grid-template-columns:1fr 1fr;} .grid.three{grid-template-columns:1fr 1fr 1fr;}}
  .island{position:relative;border:0;cursor:pointer;font-family:inherit;text-align:left;color:#3a2f2a;
    border-radius:22px;padding:18px;box-shadow:0 12px 26px rgba(0,0,0,.25);overflow:hidden;}
  .island:disabled{filter:grayscale(.7) brightness(.8);cursor:not-allowed;}
  .island .big{font-size:50px;line-height:1;} .island h3{font-size:19px;margin:6px 0 2px;}
  .island .meta{font-size:12.5px;opacity:.96;font-weight:700;}
  .island .lockwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(15,23,42,.5);font-weight:900;font-size:16px;color:#fff;}
  .lvl{border:0;cursor:pointer;font-family:inherit;background:#fff;border-radius:18px;padding:14px;
    box-shadow:0 8px 16px rgba(0,0,0,.14);text-align:center;}
  .lvl .e{font-size:34px;} .lvl .t{font-weight:800;font-size:14px;margin-top:4px;}
  .lvl .b{font-size:11.5px;color:#64748b;}
  .stage{position:relative;height:230px;border-radius:22px;overflow:hidden;background:linear-gradient(#e7f1ff 0%,#f1f6ff 54%,#fdeede 54%,#f7e6cf 100%);border:5px solid #fcd9a6;}
  .floor{position:absolute;left:0;right:0;bottom:0;height:46px;background:repeating-linear-gradient(90deg,#ecceaa,#ecceaa 26px,#e0bd92 26px,#e0bd92 52px);}
  .fighter{position:absolute;bottom:40px;transition:left .4s ease, transform .15s;}
  .hero{left:6%;} .boss{right:6%;}
  .boss .bsprite{font-size:clamp(60px,15vw,98px);filter:drop-shadow(0 6px 10px rgba(0,0,0,.4));}
  @keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes heroHit{0%{transform:translateX(0)}45%{transform:translateX(150px) scale(1.08)}100%{transform:translateX(0)}}
  @keyframes heroHurt{0%,100%{transform:translateX(0)}25%{transform:translateX(-14px) rotate(-7deg)}75%{transform:translateX(10px) rotate(6deg)}}
  @keyframes bossHurt{0%,100%{transform:translateX(0)}25%{transform:translateX(16px)}75%{transform:translateX(-12px)}}
  @keyframes bossHit{0%{transform:translateX(0)}45%{transform:translateX(-130px) scale(1.06)}100%{transform:translateX(0)}}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12);opacity:1}100%{transform:scale(1)}}
  @keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-80px);opacity:0}}
  .idle{animation:idleBob 1.4s ease-in-out infinite;}
  @keyframes koLeft{0%{transform:rotate(0) translateY(0)}40%{transform:rotate(-24deg)}100%{transform:rotate(-82deg) translateY(16px);opacity:.9}}
  @keyframes koRight{0%{transform:rotate(0) translateY(0)}40%{transform:rotate(24deg)}100%{transform:rotate(82deg) translateY(16px);opacity:.9}}
  .koHero{animation:koLeft .65s ease-in forwards;transform-origin:bottom center;}
  .koBoss{animation:koRight .65s ease-in forwards;transform-origin:bottom center;}
  .doHeroHit{animation:heroHit .45s ease-out;} .doHeroHurt{animation:heroHurt .45s ease-in-out;}
  .doBossHurt{animation:bossHurt .4s ease-in-out;} .doBossHit{animation:bossHit .45s ease-out;}
  @keyframes guard{0%{transform:translateX(0) scale(1)}30%{transform:translateX(14px) scaleX(.9) scaleY(1.05)}60%{transform:translateX(14px) scaleX(.9)}100%{transform:translateX(0) scale(1)}}
  .doGuard{animation:guard .5s ease-out;}
  @keyframes shieldPulse{0%{transform:scale(.7);opacity:0}40%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:.95}}
  #shieldBadge{animation:shieldPulse .35s ease-out;}
  @keyframes bLunge{0%{transform:translateX(0)}45%{transform:translateX(-120px) scale(1.06)}100%{transform:translateX(0)}}
  @keyframes bDash{0%{transform:translateX(0)}24%{transform:translateX(-140px)}32%{transform:translateX(-140px)}70%{transform:translateX(10px)}100%{transform:translateX(0)}}
  @keyframes bPounce{0%{transform:translate(0,0)}40%{transform:translate(-115px,-46px)}62%{transform:translate(-115px,0)}100%{transform:translate(0,0)}}
  @keyframes bStrike{0%{transform:translateX(0)}22%{transform:translateX(-95px) scaleX(1.05)}38%{transform:translateX(-95px)}100%{transform:translateX(0)}}
  @keyframes bSlam{0%{transform:translateX(0) rotate(0)}42%{transform:translateX(-110px) rotate(-9deg) scale(1.07)}100%{transform:translateX(0) rotate(0)}}
  @keyframes bSwoop{0%{transform:translate(0,0)}30%{transform:translate(-66px,-52px)}62%{transform:translate(-120px,8px)}100%{transform:translate(0,0)}}
  @keyframes bSpin{0%{transform:translateX(0) rotate(0)}50%{transform:translateX(-110px) rotate(360deg)}100%{transform:translateX(0) rotate(0)}}
  .bLunge{animation:bLunge .44s ease-out;} .bDash{animation:bDash .44s ease-out;} .bPounce{animation:bPounce .44s ease-out;}
  .bStrike{animation:bStrike .42s ease-out;} .bSlam{animation:bSlam .44s ease-out;} .bSwoop{animation:bSwoop .44s ease-out;} .bSpin{animation:bSpin .44s ease-out;}
  .pop{animation:pop .35s ease-out;}
  .fx{position:absolute;font-size:32px;font-weight:900;animation:floatUp 1s ease-out forwards;pointer-events:none;}
  .hpwrap{position:absolute;left:12px;right:12px;top:10px;display:flex;justify-content:space-between;gap:14px;font-weight:800;color:#fff;font-size:13px;}
  .hpbar{height:12px;border-radius:999px;background:rgba(255,255,255,.25);overflow:hidden;margin-top:3px;}
  .hpbar>i{display:block;height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b);transition:width .4s;}
  .hearts{font-size:20px;letter-spacing:2px;}
  .opt{width:100%;text-align:center;font-weight:800;font-size:clamp(16px,4.4vw,21px);padding:15px;border-radius:16px;
    background:#fff;border:4px solid #fcd34d;color:#0f172a;cursor:pointer;font-family:inherit;}
  .opt:hover{background:#fffbeb;} .opt:disabled{opacity:.55;cursor:not-allowed;}
  .opt.good{background:#dcfce7;border-color:#16a34a;} .opt.bad{background:#fee2e2;border-color:#ef4444;}
  .qpic{text-align:center;}
  .qtext{font-size:clamp(17px,4.4vw,24px);font-weight:800;text-align:center;margin:8px 0;line-height:1.35;}
  .ans-input{width:100%;text-align:center;font-size:24px;font-weight:800;padding:14px;border-radius:16px;
    border:4px solid #fcd34d;outline:none;font-family:inherit;}
  .ans-input:focus{border-color:#f59e0b;}
  .timerbar{height:10px;border-radius:999px;background:#e2e8f0;overflow:hidden;margin:6px 0 10px;}
  .timerbar>i{display:block;height:100%;background:linear-gradient(90deg,#f59e0b,#ef4444);width:100%;}
  .slot{min-height:58px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px;border-radius:16px;background:#fff7e6;border:4px dashed #fcd34d;}
  .picked{font-size:19px;font-weight:800;padding:9px 13px;border-radius:11px;background:#f59e0b;color:#fff;}
  .chip{font-size:21px;font-weight:800;padding:11px 16px;border-radius:13px;background:#fff;border:4px solid #fcd34d;cursor:pointer;font-family:inherit;}
  .chip:disabled{opacity:.5;}
  .kw-add{background:#bbf7d0;color:#14532d;border-radius:5px;padding:1px 5px;font-weight:900;}
  .kw-sub{background:#fecdd3;color:#881337;border-radius:5px;padding:1px 5px;font-weight:900;}

// Migrate older profiles to the Dragon Island schema. Coins kept, dojo
// progress + badges + scrolls reset, new intro replayed once.
function migrateState(s){
  if(!s)return s;
  if(s.schemaVersion>=5)return s;
  // v4 -> v5: "Even & Odd" dojo became "Time" (Dragon Timekeeper). Carry
  // any cleared/win progress forward under the new topic key so existing
  // players keep their badge progress.
  if(s.schemaVersion===4){
    if(s.cleared && s.cleared["1:Even & Odd"]){
      s.cleared["1:Time"] = true;
      delete s.cleared["1:Even & Odd"];
    }
    s.schemaVersion = 5;
    return s;
  }
  // v1-v3 -> v5: full Dragon Island reset path (matches the v4 migration)
  s.equip = {Suit:(s.equip&&s.equip.Suit)||"sk_bare", Headband:(s.equip&&s.equip.Headband)||"hb_none"};
  s.owned = (s.owned||[]).filter(function(id){return /^(sk_|hb_)/.test(id);});
  if(s.owned.indexOf("sk_bare")<0)s.owned.push("sk_bare");
  if(s.owned.indexOf("hb_none")<0)s.owned.push("hb_none");
  s.cleared = {};
  s.finalCleared = {};
  s.islandWins = {};
  s.stars = 0;
  s.islandLives = 3;
  s.islandMaxLives = 3;
  s.pizzaEaten = false;
  s.firstAidKits = 0;

  s.scrolls = 0;

  s.schemaVersion = 5;
  return s;
}
function defaultRoot(){return{version:2,current:null,profiles:{}};}

  try{var r=localStorage.getItem(ROOT_KEY);if(r){var o=JSON.parse(r);if(o&&o.profiles)return Object.assign(defaultRoot(),o);}}catch(e){}
  try{var b=localStorage.getItem(ROOT_KEY+"_bak");if(b){var o2=JSON.parse(b);if(o2&&o2.profiles)return Object.assign(defaultRoot(),o2);}}catch(e){}
  return defaultRoot();
}
function loadActive(){
  if(!ROOT.current||!ROOT.profiles[ROOT.current])return defaultState();

}
function save(){
  try{S.saved=Date.now();
    if(!ROOT.current){var id=pid();ROOT.current=id;ROOT.profiles[id]=S;}else ROOT.profiles[ROOT.current]=S;
    var j=JSON.stringify(ROOT);localStorage.setItem(ROOT_KEY,j);try{localStorage.setItem(ROOT_KEY+"_bak",j);}catch(e){}

}

  if(ROOT.current===id){var k=Object.keys(ROOT.profiles);ROOT.current=k[0]||null;S=ROOT.current?Object.assign(defaultState(),ROOT.profiles[ROOT.current]):defaultState();}
  try{var j=JSON.stringify(ROOT);localStorage.setItem(ROOT_KEY,j);localStorage.setItem(ROOT_KEY+"_bak",j);}catch(e){}}

/* ---------- Firebase cloud auto-save (Realtime Database) ----------
   Stays fully offline if Firebase fails to load or no Cloud Code is set.
   To use: set the SAME Cloud Code on each device (Parent Report > Cloud). */
var FIREBASE_CONFIG={
  apiKey:"AIzaSyA2wpwYT4PBzxtSQzl2th5yEfPKlDd0pls",
  authDomain:"maths-island-battle.firebaseapp.com",
  databaseURL:"https://maths-island-battle-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"maths-island-battle"
};
var CLOUD_KEY="mathisland_cloud", TS_KEY="mathisland_t", fbReady=false, fbDB=null, _pushTimer;
function getCloud(){try{return Object.assign({code:"",auto:true},JSON.parse(localStorage.getItem(CLOUD_KEY)||"{}"));}catch(e){return{code:"",auto:true};}}
function setCloud(c){try{localStorage.setItem(CLOUD_KEY,JSON.stringify(c));}catch(e){}}
function fbConfigured(){return !!(FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.apiKey);}
function fbInit(){
  if(fbReady)return true;
  if(!fbConfigured()||typeof firebase==="undefined"||!firebase.initializeApp)return false;
  try{ if(!firebase.apps||!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
       fbDB=firebase.database(); fbReady=true; }catch(e){ fbReady=false; }
  return fbReady;
}
function cloudActive(){if(!fbInit())return false; if(_authUser)return getCloud().auto!==false; var c=getCloud(); return !!c.code&&c.auto!==false;}
var _lastCloudErr="", _lastAuthErr="", _authUser=null, _authReady=false, _migrated=false;
// Firebase RTDB paths can't contain . # $ [ ] / — translate the user-facing
// code (e.g. an email) into a safe key. The original code stays visible in the UI.
function safePath(code){return String(code||"").toLowerCase()
  .replace(/@/g,"_at_").replace(/\./g,"_dot_")
  .replace(/[#\$\[\]\/]/g,"_").replace(/\s+/g,"_");}
// Path used by cloud save: prefer Firebase Auth UID when signed in (locked-down
// per-user storage); otherwise fall back to the user-typed code (legacy mode).
function cloudKey(){ if(_authUser&&_authUser.uid)return _authUser.uid; var c=getCloud(); return c.code?safePath(c.code):""; }
function cloudPush(done){
  if(!fbInit()){_lastCloudErr="Firebase SDK not loaded (offline or blocked).";return done&&done(false);}
  var k=cloudKey(); if(!k){_lastCloudErr="Not signed in and no cloud code set.";return done&&done(false);}
  try{ fbDB.ref("saves/"+k).set({t:Date.now(),json:JSON.stringify(ROOT)},function(err){
    if(err){_lastCloudErr=(err&&(err.code||err.message))?String(err.code||err.message):"unknown error";}
    else{_lastCloudErr="";}
    done&&done(!err);
  }); }
  catch(e){ _lastCloudErr=String(e&&e.message||e); done&&done(false); }
}
function cloudPull(cb){
  if(!fbInit()){_lastCloudErr="Firebase SDK not loaded (offline or blocked).";return cb(null);}
  var k=cloudKey(); if(!k){_lastCloudErr="Not signed in and no cloud code set.";return cb(null);}
  try{ fbDB.ref("saves/"+k).once("value").then(function(s){_lastCloudErr="";cb(s.val());},function(err){_lastCloudErr=(err&&(err.code||err.message))?String(err.code||err.message):"unknown error";cb(null);}); }
  catch(e){ _lastCloudErr=String(e&&e.message||e); cb(null); }
}
// ---------- Firebase Auth (Netflix-style email + password login) ----------
function authReady(){return !!(_authReady);}
function authUser(){return _authUser;}
function fbAuthInit(cb){
  if(!fbInit()){_authReady=true;cb&&cb();return;}
  try{
    firebase.auth().onAuthStateChanged(function(u){
      _authUser=u||null; _authReady=true;
      // Auto-migrate from legacy typed-code path to UID path the first time we
      // see this signed-in user on this device.
      if(_authUser && !_migrated){ _migrated=true; tryMigrateLegacySave(); }
      cb&&cb();
      try{ render(); }catch(e){}
    });
  }catch(e){ _authReady=true; cb&&cb(); }
}
function authSignUp(email,pass,done){
  if(!fbInit()){_lastAuthErr="Cloud offline.";return done&&done(false);}
  firebase.auth().createUserWithEmailAndPassword(email,pass)
    .then(function(){_lastAuthErr="";done&&done(true);})
    .catch(function(e){_lastAuthErr=prettyAuthErr(e);done&&done(false);});
}
function authSignIn(email,pass,done){
  if(!fbInit()){_lastAuthErr="Cloud offline.";return done&&done(false);}
  firebase.auth().signInWithEmailAndPassword(email,pass)
    .then(function(){_lastAuthErr="";done&&done(true);})
    .catch(function(e){_lastAuthErr=prettyAuthErr(e);done&&done(false);});
}
function authReset(email,done){
  if(!fbInit()){_lastAuthErr="Cloud offline.";return done&&done(false);}
  firebase.auth().sendPasswordResetEmail(email)
    .then(function(){_lastAuthErr="";done&&done(true);})
    .catch(function(e){_lastAuthErr=prettyAuthErr(e);done&&done(false);});
}
function authSignOut(done){
  if(!fbInit()){_lastAuthErr="Cloud offline.";return done&&done(false);}
  firebase.auth().signOut().then(function(){_authUser=null;_migrated=false;done&&done(true);})
    .catch(function(e){_lastAuthErr=prettyAuthErr(e);done&&done(false);});
}
function prettyAuthErr(e){var c=e&&(e.code||e.message)||"unknown";
  if(c==="auth/invalid-email")return "That email doesn't look right.";
  if(c==="auth/email-already-in-use")return "That email already has an account — try Sign In instead.";
  if(c==="auth/weak-password")return "Password too weak — use 6+ characters.";
  if(c==="auth/wrong-password"||c==="auth/invalid-credential"||c==="auth/invalid-login-credentials")return "Email or password is wrong.";
  if(c==="auth/user-not-found")return "No account for that email — try Sign Up.";
  if(c==="auth/too-many-requests")return "Too many attempts — wait a minute and try again.";
  if(c==="auth/network-request-failed")return "No internet — check your connection.";
  return String(c);
}
// One-time copy of an old "typed cloud code" save into the new UID-keyed path,
// so Wing's existing phone progress follows him into his new email account.
function tryMigrateLegacySave(){
  if(!fbInit()||!_authUser||!_authUser.email)return;
  var legacy=safePath(_authUser.email);
  var modern=_authUser.uid;
  if(!legacy||!modern||legacy===modern)return;
  fbDB.ref("saves/"+modern).once("value").then(function(modSnap){
    var modVal=modSnap.val();
    fbDB.ref("saves/"+legacy).once("value").then(function(legSnap){
      var legVal=legSnap.val();
      if(legVal && legVal.json && (!modVal || (legVal.t||0)>(modVal.t||0))){
        fbDB.ref("saves/"+modern).set({t:legVal.t||Date.now(),json:legVal.json},function(err){
          if(!err)toast("☁️ Imported your earlier cloud save");
        });
      }
    },function(){});
  },function(){});
}
function adoptCloud(rem){
  if(!rem||!rem.json)return false;
  try{ var o=JSON.parse(rem.json); if(!o||!o.profiles)return false;
    localStorage.setItem(ROOT_KEY,rem.json); try{localStorage.setItem(ROOT_KEY+"_bak",rem.json);}catch(e){}
    localStorage.setItem(TS_KEY,String(rem.t||Date.now()));
    ROOT=loadRoot(); S=loadActive(); return true;
  }catch(e){ return false; }
}
function scheduleCloudPush(){ if(!cloudActive())return; clearTimeout(_pushTimer); _pushTimer=setTimeout(function(){cloudPush();},1500); }
function bootCloudSync(){
  if(!cloudActive())return;
  cloudPull(function(rem){
    if(rem&&rem.json){ var lt=+(localStorage.getItem(TS_KEY)||0);
      if((rem.t||0)>lt && adoptCloud(rem)){ toast("☁️ Synced latest from cloud"); render(); } }
  });
}

/* ---------------- helpers ---------------- */
function $(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function dojosCleared(n){return TOPICS.every(function(t){return S.cleared[n+":"+t.id];});}
function islandCleared(n){return dojosCleared(n) && !!(S.finalCleared&&S.finalCleared[n]);}

function itemById(id){return ITEMS.filter(function(x){return x.id===id;})[0];}
function equipData(){
  var d={top:"bare",coat:"#f8fafc",suit:"#facc15",trim:"#0b0b0b",pants:"#0b0b0b",stripe:"#0b0b0b",shoes:"#0b0b0b",band:null,gear:null,aura:null};
  Object.keys(S.equip).forEach(function(c){var it=itemById(S.equip[c]);if(it)Object.assign(d,it.d);});
  return d;
}
function toast(msg){var t=$("toast");t.textContent=msg;t.style.opacity="1";clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity="0";},1900);}
function norm(s){return String(s).trim().toLowerCase().replace(/\s+/g,"").replace(/[°]/g,"");}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){var t=b;b=a%b;a=t;}return a||1;}
function isCorrect(q,given){
  var cands=[q.answer].concat(q.accept||[]);
  var gNum=Number(String(given).replace(/[^0-9.\-]/g,""));
  for(var i=0;i<cands.length;i++){var c=cands[i];
    if(norm(c)===norm(given))return true;
    var cNum=Number(String(c).replace(/[^0-9.\-]/g,""));
    if(!isNaN(gNum)&&!isNaN(cNum)&&String(given).trim()!==""&&gNum===cNum&&/[0-9]/.test(c))return true;}
  return false;
}
function kw(text){
  var map=[[/\b(altogether|more)\b/gi,"kw-add"],[/\b(gave away|gave|left|fewer)\b/gi,"kw-sub"],[/\b(each|every)\b/gi,"kw-mul"]];
  var out=esc(text);map.forEach(function(p){out=out.replace(p[0],function(m){return '<span class="'+p[1]+'">'+m+'</span>';});});
  return out;
}
function nOptsFor(diff){return Math.min(3+(diff>=2?1:0)+(diff>=4?1:0),5);}
function uniqOpts(correct,wrongs,n){
  var out=[String(correct)],seen={};seen[norm(correct)]=1;
  wrongs=shuffle(wrongs);
  for(var i=0;i<wrongs.length&&out.length<n;i++){var w=String(wrongs[i]);if(!seen[norm(w)]){seen[norm(w)]=1;out.push(w);}}
  return shuffle(out);
}

/* ---------------- sound (Web Audio, no files) ---------------- */
var actx=null;
function tone(f,st,d,tp){try{if(!actx){var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;actx=new AC();}
  var o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime+st;o.type=tp||"sine";o.frequency.value=f;
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.22,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.connect(g).connect(actx.destination);o.start(t);o.stop(t+d+.02);}catch(e){}}
function sfx(n){
  if(n==="hit"){tone(660,0,.1,"triangle");tone(880,.08,.12,"triangle");}
  else if(n==="miss"){tone(180,0,.22,"sawtooth");}
  else if(n==="win"){tone(523,0,.14);tone(659,.14,.14);tone(784,.28,.14);tone(1046,.42,.3);}
  else if(n==="lose"){tone(300,0,.2,"sawtooth");tone(220,.2,.35,"sawtooth");}
  else if(n==="coin"){tone(900,0,.06,"square");tone(1200,.05,.07,"square");}
}

/* ---------------- SVG: clock / 3D shapes / right-angle pictures --------- */
function clockSVG(h,m){
  var cx=110,cy=110,ma=m*6,ha=((h%12)+m/60)*30;
  function tip(a,L){a=(a-90)*Math.PI/180;return[cx+L*Math.cos(a),cy+L*Math.sin(a)];}
  var mt=tip(ma,78),ht=tip(ha,52),ticks="",nums="";
  for(var i=0;i<60;i++){var a=(i*6-90)*Math.PI/180,big=i%5===0,inn=big?86:92;
    ticks+='<line x1="'+(cx+inn*Math.cos(a))+'" y1="'+(cy+inn*Math.sin(a))+'" x2="'+(cx+98*Math.cos(a))+'" y2="'+(cy+98*Math.sin(a))+'" stroke="'+(big?"#b45309":"#d1d5db")+'" stroke-width="'+(big?3:1.5)+'" stroke-linecap="round"/>';}
  for(var n=1;n<=12;n++){var aa=(n*30-90)*Math.PI/180;
    nums+='<text x="'+(cx+70*Math.cos(aa))+'" y="'+(cy+70*Math.sin(aa)+8)+'" text-anchor="middle" font-size="22" font-weight="800" fill="#92400e">'+n+'</text>';}
  return '<svg viewBox="0 0 220 220" width="190" height="190"><circle cx="110" cy="110" r="106" fill="#fde68a"/><circle cx="110" cy="110" r="100" fill="#fffbeb" stroke="#f59e0b" stroke-width="6"/>'+ticks+nums+
    '<line x1="110" y1="110" x2="'+ht[0]+'" y2="'+ht[1]+'" stroke="#1d4ed8" stroke-width="9" stroke-linecap="round"/>'+
    '<line x1="110" y1="110" x2="'+mt[0]+'" y2="'+mt[1]+'" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/><circle cx="110" cy="110" r="8" fill="#111827"/></svg>';
}

function rightSVG(k){
  var L="#0f766e",g="";
  if(k==="rectangle")g='<rect x="40" y="55" width="140" height="90" fill="#5eead4"/>';
  else if(k==="house")g='<rect x="60" y="90" width="100" height="80" fill="#fcd34d"/><polygon points="50,90 110,40 170,90" fill="#fb7185"/><rect x="95" y="125" width="30" height="45" fill="#92400e"/>';
  else if(k==="robot")g=
    /* Head rectangle (4 right angles) + Body rectangle (4 right angles) = 8.
       Arms/legs drawn as plain lines so they don't add extra right angles. */
    '<rect x="80" y="25" width="60" height="50" fill="#93c5fd"/>'+
    '<rect x="60" y="80" width="100" height="80" fill="#a5b4fc"/>'+
    '<line x1="110" y1="15" x2="110" y2="25"/>'+

    '<line x1="160" y1="100" x2="182" y2="120" stroke-linecap="round"/>'+

    '<line x1="140" y1="160" x2="140" y2="184" stroke-linecap="round"/>';
  else if(k==="rocket")g='<rect x="85" y="60" width="50" height="90" fill="#bae6fd"/><polygon points="85,60 110,20 135,60" fill="#fb7185"/><polygon points="85,130 60,180 85,150" fill="#fdba74"/><polygon points="135,130 160,180 135,150" fill="#fdba74"/><circle cx="110" cy="95" r="12" fill="#fef08a"/>';
  else if(k==="boat")g=
    /* Rectangular hull (4 right angles at the 4 corners) ... */
    '<rect x="40" y="150" width="140" height="32" fill="#fca5a5"/>'+
    /* ... + a right-triangle sail whose base meets the mast at a right angle (the 5th). */

/* ----------------- Visual SVGs for Dragon Shield / Stone / Corner ---------- */
function shape2DSVG(k){
  var st="#4338ca", f="#c7d2fe";
  function regular(n, r, rot){
    var pts=[]; for(var i=0;i<n;i++){var a=((i*360/n)+rot-90)*Math.PI/180;pts.push((100+r*Math.cos(a)).toFixed(1)+","+(100+r*Math.sin(a)).toFixed(1));}
    return pts.join(" ");
  }
  var inner="";
  if(k==="triangle"||k==="equilateral_triangle") inner='<polygon points="100,30 30,170 170,170" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="isosceles_triangle") inner='<polygon points="100,20 50,170 150,170" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="square") inner='<rect x="50" y="50" width="100" height="100" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="rectangle") inner='<rect x="20" y="65" width="160" height="80" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="circle") inner='<circle cx="100" cy="100" r="65" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="oval") inner='<ellipse cx="100" cy="100" rx="80" ry="50" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="rhombus") inner='<polygon points="100,25 175,100 100,175 25,100" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="trapezium") inner='<polygon points="60,55 140,55 180,160 20,160" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="pentagon"||k==="regular_pentagon") inner='<polygon points="'+regular(5,70,0)+'" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="hexagon") inner='<polygon points="'+regular(6,70,30)+'" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  else if(k==="octagon") inner='<polygon points="'+regular(8,70,22.5)+'" fill="'+f+'" stroke="'+st+'" stroke-width="4"/>';
  return '<svg viewBox="0 0 200 200" width="170" height="170">'+inner+'</svg>';
}

function angleViewSVG(deg){

  var ar = 32;
  var arX = cx + ar*Math.cos(-rad);
  var arY = cy + ar*Math.sin(-rad);

  var rightMark = (deg===90)
    ? '<rect x="'+(cx+1)+'" y="'+(cy-21)+'" width="20" height="20" fill="none" stroke="#dc2626" stroke-width="2"/>'
    : '';

// Resolve a visual key like "shape2d:triangle" / "shape3d:cube" / "angle:90"
// / "anglecmp:45,90" / "obj:🎲" to the matching inline HTML.
function resolveVisual(key){
  if(!key) return "";
  var i = key.indexOf(":"); if(i<0) return "";
  var kind = key.slice(0,i), val = key.slice(i+1);
  if(kind==="shape2d") return shape2DSVG(val);
  if(kind==="shape3d") return shape3DSVG(val);

  if(kind==="anglecmp"){var p = val.split(","); return angleCompareSVG(+p[0], +p[1]);}
  if(kind==="obj")     return objectIconSVG(val);
  return "";
}

function genAddSub(diff){

  var d=digitsFor(diff),r=Math.random(),form;
  if(r<0.30)form="add"; else if(r<0.65)form="sub"; else if(r<0.85)form="missStart"; else form="missPart";
  var q={type:"direct"};
  if(form==="add"){var A=numD(d),B=numD(d);q.prompt=A+" + "+B+" = ?";q.answer=String(A+B);
    q.explain="Add place by place: "+A+" + "+B+" = "+(A+B)+".";q.hint="Add the ones, tens, hundreds…";}
  else if(form==="sub"){var A2=numD(d),B2=numD(d);if(B2>A2){var t=A2;A2=B2;B2=t;}
    q.prompt=A2+" - "+B2+" = ?";q.answer=String(A2-B2);q.explain=A2+" - "+B2+" = "+(A2-B2)+".";q.hint="Subtract step by step.";}
  else if(form==="missStart"){var B3=numD(d),C3=numD(d),X=B3+C3;
    q.prompt="___ - "+B3+" = "+C3+"   (missing number?)";q.answer=String(X);
    q.explain="Add them back: "+C3+" + "+B3+" = "+X+".";q.hint="Missing start of a subtraction → ADD the two numbers.";}
  else{var A4=numD(d),P=numD(d),T=A4+P;

    q.explain="Missing part = "+T+" - "+A4+" = "+P+".";q.hint="Total minus the known part.";}
  return q;
}
function genMul(diff){

function genOrder(diff){

  if(items.join(",")===sorted.map(String).join(","))items=shuffle(items);
  return {type:"ordering",
    prompt:"Tap the numbers in "+(asc?"ASCENDING order":"DESCENDING order")+".",
    items:items,answer:sorted.map(String).join(","),

function genFrac(diff){
  var den=rnd(2,[0,6,9,12,12,15][diff]);
  var cnt=diff>=4?3:2;
  var T=rnd(cnt,den);                 // total of numerators (each >=1, sum<=den)
  var parts=[];for(var i=0;i<cnt;i++)parts.push(1);
  for(var k=0;k<T-cnt;k++)parts[rnd(0,cnt-1)]++;
  var ans=T+"/"+den, accept=[];
  if(T%den===0)accept.push(String(T/den)),accept.push((T/den)+"/1");
  var g=gcd(T,den);if(g>1)accept.push((T/g)+"/"+(den/g));

    prompt:parts.map(function(n){return n+"/"+den;}).join(" + ")+" = ?",
    answer:ans,accept:accept,
    explain:"Same bottom ("+den+"). Add the tops: "+parts.join(" + ")+" = "+T+" → "+T+"/"+den+(T%den===0?(" = "+(T/den)):"")+".",
    hint:"Same denominator → just add the top numbers."};
}

function genEvenOdd(diff){
  var r=Math.random();
  if(r<0.5){ // is N even or odd?
    var d=digitsFor(diff), N=numD(d);
    var isEven=(N%2===0);
    return {type:"multiple",prompt:"Is "+N+" EVEN or ODD?",
      answer:isEven?"Even":"Odd",options:["Even","Odd"],
      explain:N+" ends in "+(N%10)+". "+(isEven?"Last digit is 0,2,4,6 or 8 → EVEN.":"Last digit is 1,3,5,7 or 9 → ODD."),
      hint:"Look at the LAST digit. 0,2,4,6,8 = even. 1,3,5,7,9 = odd."};
  } else { // pick the even/odd one
    var d2=digitsFor(diff), pickEven=Math.random()<0.5, target=null, pool=[];
    while(pool.length<4){
      var x=numD(d2);
      if(pool.indexOf(x)<0){
        var ok=(x%2===0)===pickEven;
        if(ok && !target){target=x;pool.push(x);}
        else if(!ok)pool.push(x);
      }
    }
    if(!target){target=numD(d2)*2-(pickEven?0:1); pool[0]=target;}
    return {type:"multiple",prompt:"Pick the "+(pickEven?"EVEN":"ODD")+" number:",
      answer:String(target),options:shuffle(pool.map(String)),
      explain:target+" ends in "+(target%10)+" → "+(pickEven?"EVEN":"ODD")+".",
      hint:"Even = last digit 0,2,4,6,8.  Odd = last digit 1,3,5,7,9."};
  }
}

/* Wing's Year 3 Dragon Timekeeper Dojo bank: 50 visual clock MCQs.
   Stored as [hour, minute] pairs — the game's existing clockSVG()
   renderer draws the analog clock face, and the option set + answer
   are derived from the minute:
     m === 0  -> options [H:00, H:15, H:30, H:45], answer "H:00"
     m === 15 -> word options ["Quarter past H", "Quarter to H",
                  "Half past H", "H o'clock"], answer "Quarter past H"
     m === 30 -> options [H:00, H:15, H:30, H:45], answer "H:30"
     m === 45 -> word options ["Quarter past H", "Quarter to nextH",
                  "Half past H", "nextH o'clock"], answer
                  "Quarter to nextH" (nextH wraps 12 -> 1)
   No PNG files needed — clockSVG renders the visual inline. */
var TIME_QUESTIONS=[
 // o'clock (5)
 [1,0],[3,0],[5,0],[8,0],[10,0],
 // half past (5)
 [2,30],[4,30],[6,30],[9,30],[11,30],
 // quarter past — Q11-22 cover hours 1..12, then Q23-25 repeat 2,5,9
 [1,15],[2,15],[3,15],[4,15],[5,15],[6,15],[7,15],[8,15],[9,15],[10,15],[11,15],[12,15],
 [2,15],[5,15],[9,15],
 // quarter to — Q26-37 cover hours 1..12, then Q38-40 repeat 2,5,9
 [1,45],[2,45],[3,45],[4,45],[5,45],[6,45],[7,45],[8,45],[9,45],[10,45],[11,45],[12,45],

];
function timeKeeperMakeQ(){
  var qp = pick(TIME_QUESTIONS);
  var h = qp[0], m = qp[1];
  var options, answer;
  if(m===0 || m===30){
    options = [h+":00", h+":15", h+":30", h+":45"];

    answer = "Quarter to "+nh;
  }
  return {type:"multiple", topic:"Time",
    prompt:"What time is shown?",
    options:options,
    answer:answer,
    visualHTML: clockSVG(h, m),
    explain:"The clock shows "+answer+".",
    hint:"Short hand = hour. Long hand = minute. Long hand at 12 = o'clock, at 3 = quarter past, at 6 = half past, at 9 = quarter to."};
}

  var prompt = a1+"/"+d+" + "+a2+"/"+d+" = ?";

}

function waterMakeQ(){

  if(bucket==="cmp"){
    var pair = pick(WATER_DATA.cmp);
    var more = Math.max(pair[0], pair[1]);
    var less = Math.min(pair[0], pair[1]);
    var a = pair[0]+" L", b = pair[1]+" L";
    return {type:"multiple",
      prompt:"Which holds more: "+a+" or "+b+"?",
      options:[a, b], answer:more+" L",
      explain:more+" L holds more than "+less+" L.",
      hint:"More litres = more capacity. Compare the numbers."};
  }
  if(bucket==="lToMl"){
    var L = pick(WATER_DATA.lToMl);
    return {type:"direct",
      prompt:"Convert "+L+" L to ml.",
      answer:(L*1000)+" ml",
      explain:L+" L × 1000 = "+(L*1000)+" ml.",
      hint:"1 L = 1000 ml. Multiply litres by 1000."};
  }
  if(bucket==="mlToL"){
    var ml = pick(WATER_DATA.mlToL);
    return {type:"direct",
      prompt:"Convert "+ml+" ml to L.",
      answer:(ml/1000)+" L",
      explain:ml+" ml ÷ 1000 = "+(ml/1000)+" L.",
      hint:"1000 ml = 1 L. Divide millilitres by 1000."};
  }
  // mixed
  var m = pick(WATER_DATA.mixed);
  var prompt = (m[0].indexOf("?")>=0) ? m[0] : m[0]+" = ?";
  var explain = (m[0].indexOf("?")>=0)
    ? m[0].replace("?", m[1].split(" ")[0])

  return {type:"direct",
    prompt:prompt, answer:m[1],
    explain:explain+".",
    hint:"Same units? Add or subtract. Different units? Convert first (1 L = 1000 ml)."};
}

function makeQ(topicId,diff){
  // Wing's curated Dragon Claw Dojo bank — overrides procedural generation
  // and the EXAM bank for this topic entirely.
  if(topicId==="Plus, Minus & Missing Numbers"){
    var cl = pick(CLAW_QUESTIONS);
    return {type:"direct", topic:topicId,
      prompt: cl.p, answer: String(cl.a),
      explain: clawExplain(cl), hint: clawHint(cl.p)};
  }
  // Wing's curated Dragon Stair Dojo bank (Year 3 place value / ordering /
  // comparing). Stair questions mix typed and tap-chip input.
  if(topicId==="Ascending & Descending"){
    var sq = stairMakeQ(); sq.topic = topicId; return sq;
  }
  // Wing's curated Dragon Split Dojo bank (Year 3 division facts, 2x-10x).
  if(topicId==="Division"){
    var sp = pick(SPLIT_QUESTIONS);
    var dividend = sp[0], divisor = sp[1], quotient = dividend/divisor;
    return {type:"direct", topic:topicId,
      prompt: dividend+" ÷ "+divisor+" = ?",
      answer: String(quotient),
      explain: dividend+" ÷ "+divisor+" = "+quotient+".",
      hint: "Ask yourself: "+divisor+" × ? = "+dividend+"."};
  }
  // Wing's curated Dragon Strength Dojo bank (Year 3 mass: comparison +
  // unit conversion + simple arithmetic/conversion mix).
  if(topicId==="Mass"){
    var mq = strengthMakeQ(); mq.topic = topicId; return mq;
  }
  // Wing's curated Dragon Tail Dojo bank (Year 3 length: comparison +
  // m↔cm conversion + simple arithmetic/conversion mix).
  if(topicId==="Length"){
    var lq = tailMakeQ(); lq.topic = topicId; return lq;
  }
  // Wing's curated Dragon Water Dojo bank (Year 3 capacity: comparison +
  // L↔ml conversion + simple arithmetic/conversion mix).
  if(topicId==="Capacity"){
    var wq = waterMakeQ(); wq.topic = topicId; return wq;
  }
  // Wing's curated Dragon Treasure Dojo bank (Year 3 money word problems,
  // RM currency, total-cost + change-from-payment).
  if(topicId==="Money"){
    var tq = treasureMakeQ(); tq.topic = topicId; return tq;
  }
  // Wing's curated visual-MCQ banks — Dragon Shield (2D), Dragon Stone (3D),
  // Dragon Corner (Angles). All render inline SVG so they work without any
  // image files on the deployed site.
  if(topicId==="2D Shapes"){
    return visualMCQ(SHIELD_QUESTIONS, topicId, "Look at the shape carefully. Count sides and corners.");
  }
  if(topicId==="3D Shapes"){
    return visualMCQ(STONE_QUESTIONS, topicId, "Think about which everyday object has that shape.");
  }
  if(topicId==="Right Angles"){
    return visualMCQ(CORNER_QUESTIONS, topicId, "Right = 90°. Acute < 90°. Obtuse > 90°.");
  }
  // Wing's curated Dragon Slice Dojo bank (Year 3 add-fractions with the
  // same denominator). Accepts unsimplified and simplified forms.
  if(topicId==="Add Fractions"){
    var fq = sliceMakeQ(); fq.topic = topicId; return fq;
  }
  // Wing's curated Dragon Timekeeper Dojo bank (Year 3 telling time —
  // o'clock / half past / quarter past / quarter to). The clock is rendered
  // inline by clockSVG so no external image files are required.
  if(topicId==="Time"){
    return timeKeeperMakeQ();
  }
  // Wing's curated Dragon Wisdom Dojo bank (Year 3 mixed word problems
  // across +, -, ÷, ×, money, length, mass, capacity, time, fractions).
  if(topicId==="Word Problems"){
    return wisdomMakeQ();
  }
  var ex=EXAM[topicId];
  if(ex && ex.length && Math.random()<0.5){ var e=Object.assign({},pick(ex)); e.topic=topicId; return e; }
  var q;
  // New Dragon Island topic IDs
  if(topicId==="Ascending & Descending")q=genOrder(diff);
  else if(topicId==="Division")q=genDiv(diff);
  else if(topicId==="Mass")q=genWeight(diff);
  else if(topicId==="Length")q=genLength(diff);
  else if(topicId==="Capacity")q=genCap(diff);
  else if(topicId==="Money")q=genMoney(diff);
  else if(topicId==="2D Shapes")q=gen2D(diff);
  else if(topicId==="3D Shapes")q=genShape(diff);
  else if(topicId==="Right Angles")q=genRight(diff);
  else if(topicId==="Even & Odd")q=genEvenOdd(diff);
  else if(topicId==="Add Fractions")q=genFrac(diff);
  else if(topicId==="Word Problems")q=genWord(diff);
  // Training-centre topics that may show up in the Dragon King mix
  else if(topicId==="Multiplication")q=genMul(diff);
  else if(topicId==="Time")q=genTime(diff);
  // Legacy fallback (older saves/EXAM bank topic IDs)
  else if(topicId==="Addition & Subtraction")q=genAddSub(diff);
  else if(topicId==="Weight Conversion")q=genWeight(diff);
  else if(topicId==="Number Order")q=genOrder(diff);
  else if(topicId==="Fractions")q=genFrac(diff);
  else q=genWord(diff);
  q.topic=topicId;
  return q;
}
// Build N questions with NO duplicate prompts within a single battle.
// Calls gen() repeatedly, retrying when the prompt has been seen already.
function uniqueBatch(n,gen){
  var out=[],seen={},tries=0,maxTries=n*10;
  while(out.length<n && tries<maxTries){tries++;
    var q=gen(); if(!q)continue;
    var key=String(q.prompt||"")+"|"+String(q.answer||"");
    if(!seen[key]){seen[key]=1;out.push(q);}
  }
  // Fallback: if the pool isn't big enough to fill uniquely, accept dups.
  while(out.length<n)out.push(gen());
  return out;
}
function buildBattle(topicId,diff){return uniqueBatch(10,function(){return makeQ(topicId,diff);});}
function buildFinalBattle(diff){
  // Dragon King arena: mix all 13 dojo topics + Multiplication (Time is
  // already in TOPICS via Dragon Timekeeper Dojo).
  var ids=TOPICS.map(function(t){return t.id;}).concat(["Multiplication"]);
  return uniqueBatch(15,function(){return makeQ(pick(ids),diff);});
}
function weakTopics(){
  return SUBJECTS.map(function(s){var st=S.subjStats[s.id]||{tot:0,ok:0};
    return{topic:s.id,acc:st.tot?st.ok/st.tot:1,tot:st.tot};})
    .filter(function(w){return w.tot>=3;}).sort(function(a,b){return a.acc-b.acc;});
}
function buildPractice(){
  var weak=weakTopics().filter(function(w){return w.acc<0.8;}).map(function(w){return w.topic;});
  if(!weak.length)weak=SUBJECTS.map(function(s){return s.id;});
  return uniqueBatch(10,function(){return makeQ(pick(weak),2);});
}

   Levels 1..10. L1 = 10 questions, +5 each level (L10 = 55).
   Multiplication -> wooden dummy.  Time -> punching bag.
   Miss the timer (or wrong) = lose 1 life (3 lives). Finish all = it breaks.
   Clearing L5 and L10 of each training gives +1 island heart (max +4).
   ========================================================================= */
var TRAIN={
  mult:{name:"Multiplication",gear:"dummy",icon:"✖️",breakWord:"the wooden dummy SHATTERS!"},
  time:{name:"Telling Time",  gear:"bag",  icon:"🕐",breakWord:"the punching bag BURSTS!"},
  // Island-specific training centres (Dragon Island). 10 questions, timed.
  // Wing's spec: keep the wooden dummy / punching bag visuals; just make the
  // Wing Chun dummy noticeably bigger than the bag.
  wingchun:{name:"Wing Chun Centre",gear:"dummy",icon:"🪵",breakWord:"the wooden dummy SHATTERS!"},
  boxing:  {name:"Boxing Centre",   gear:"bag",  icon:"🥊",breakWord:"the punching bag BURSTS!"}
};
// Render the gear for a training kind. Wing Chun dummy renders 30% larger
// than the punching bag for visual emphasis.
function trainCharSVG(kind,size,broken){
  var t=TRAIN[kind]; size=size||122;
  var actual = (t && t.gear==="dummy") ? Math.round(size*1.3) : size;
  return trainGearSVG(t?t.gear:kind, broken, actual);
}
function trainGearSVG(kind,broken,size){
  var px=size||148;
  if(kind==="bag"){
    var bg = broken
     ? '<rect x="62" y="2" width="6" height="22" fill="#161616"/><circle cx="65" cy="27" r="4" fill="#374151"/>'+
       '<path d="M44 58 L36 128 L66 116 Z" fill="#b91c1c" transform="rotate(-20 52 92)"/>'+
       '<path d="M86 56 L98 126 L70 116 Z" fill="#dc2626" transform="rotate(18 86 92)"/>'+
       '<circle cx="58" cy="84" r="4" fill="#fcd34d"/><circle cx="82" cy="100" r="3" fill="#fcd34d"/><circle cx="70" cy="74" r="3" fill="#fde68a"/>'
     : '<rect x="62" y="2" width="6" height="22" fill="#161616"/><circle cx="65" cy="27" r="4" fill="#374151"/>'+
       '<rect x="48" y="30" width="34" height="13" rx="3" fill="#161616"/>'+
       '<path d="M46 43 Q65 36 84 43 L92 122 Q65 138 38 122 Z" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>'+
       '<path d="M52 56 Q65 50 78 56 M44 80 Q65 88 86 80 M46 104 Q65 112 84 104" stroke="#991b1b" stroke-width="3" fill="none"/>'+
       '<ellipse cx="57" cy="68" rx="6" ry="10" fill="#fca5a5" opacity=".35"/>';
    return '<svg viewBox="0 0 130 150" style="height:'+px+'px;width:auto;filter:drop-shadow(0 5px 7px rgba(0,0,0,.35))">'+
      '<ellipse cx="65" cy="140" rx="40" ry="7" fill="rgba(0,0,0,.22)"/>'+bg+'</svg>';
  }
  var di = broken
   ? '<rect x="50" y="118" width="36" height="11" rx="2" fill="#92400e"/>'+
     '<rect x="56" y="70" width="16" height="50" rx="5" fill="#b45309" transform="rotate(-12 64 95)"/>'+
     '<rect x="60" y="28" width="15" height="40" rx="5" fill="#a16207" transform="rotate(15 67 48)"/>'+
     '<path d="M64 60 L38 50 M66 64 L96 80" stroke="#92400e" stroke-width="8" stroke-linecap="round"/>'+
     '<circle cx="50" cy="84" r="4" fill="#fcd34d"/><circle cx="80" cy="68" r="3" fill="#fcd34d"/><circle cx="66" cy="98" r="3" fill="#fde68a"/>'
   : '<rect x="50" y="118" width="36" height="11" rx="2" fill="#92400e"/>'+
     '<rect x="60" y="28" width="16" height="92" rx="6" fill="#b45309" stroke="#7c2d12" stroke-width="2"/>'+
     '<path d="M68 52 L38 43 M68 52 L98 43 M68 70 L41 86" stroke="#92400e" stroke-width="9" stroke-linecap="round"/>'+
     '<path d="M68 108 L92 130" stroke="#92400e" stroke-width="10" stroke-linecap="round"/>'+
     '<circle cx="68" cy="34" r="3" fill="#7c2d12"/>';
  return '<svg viewBox="0 0 130 150" style="height:'+px+'px;width:auto;filter:drop-shadow(0 5px 7px rgba(0,0,0,.35))">'+
    '<ellipse cx="66" cy="140" rx="40" ry="7" fill="rgba(0,0,0,.22)"/>'+di+'</svg>';
}
function trainQCount(level){return 10+(level-1)*5;}
function trainTime(kind,level){var base=kind==="mult"?8:10;return Math.max(4,base-Math.floor((level-1)/2));}
function trainMakeQ(kind,level){
  if(kind==="mult" || kind==="wingchun"){
    // wingchun is Wing's island centre: BOTH factors strictly from {2,3,4,5,6}
    // so no "9 × 4" style questions slip through. Year 3 spec.
    var aPool, bPool;
    if(kind==="wingchun"){
      aPool = [2,3,4,5,6];
      bPool = [2,3,4,5,6];
    } else {
      aPool = (level<=5?[1,2,3,4,5]:[6,7,8,9]);
      bPool = null; // legacy mult uses rnd(1,9) for b
    }
    var a=pick(aPool), b = bPool ? pick(bPool) : rnd(1,9);
    var ans=a*b,wr=[],t=0;
    while(wr.length<3&&t<50){t++;var dd=ans+pick([-12,-9,-8,-6,-5,-4,-3,-2,-1,1,2,3,4,5,6,8,9,12]);
      if(dd>0&&dd!==ans&&wr.indexOf(dd)<0)wr.push(dd);}
    while(wr.length<3)wr.push(ans+wr.length+1);
    return {prompt:a+" × "+b+" = ?",answer:String(ans),options:shuffle([String(ans)].concat(wr.map(String))),clock:null};
  }
  // boxing is Wing's island centre: time questions at mid difficulty (3/5).
  var d = (kind==="boxing") ? 3 : Math.min(5,1+Math.ceil(level/3));
  var q=genTime(d);
  return {prompt:q.prompt,answer:q.answer,options:q.options,clock:q.clock};
}
function trainMilestone(kind,level){
  var got=[];[5,10].forEach(function(thr){var key=kind+thr;
    if(level>=thr&&!S.trainMilestones[key]){S.trainMilestones[key]=true;S.bonusHearts=Math.min(4,(S.bonusHearts||0)+1);got.push(thr);}});
  return got;
}
var TP=null,tpTimer=null,TR_RESULT=null;
function screenTrain(){
  $("app").innerHTML='<div class="hud"><button class="btn sm ghost" id="back">⬅ Map</button>'+
    '<b>🥋 Training Dojo</b><span class="pill star">❤️ +'+(S.bonusHearts||0)+'</span></div>'+
   '<div class="card" style="margin-top:12px">'+
    '<p class="muted" style="font-size:13px;margin:0 0 12px">Speed training! Answer each question before the timer runs out — miss it (or get it wrong) and you lose a life. Clear <b>Level 5</b> and <b>Level 10</b> of each to gain +1 heart in island fights. Bonus hearts: '+(S.bonusHearts||0)+'/4.</p>'+
    '<div class="grid two">'+
     '<button class="tile" id="t-mult"><div style="height:120px;display:grid;place-items:center;overflow:hidden">'+trainGearSVG("dummy",false)+'</div>'+
       '<div style="font-weight:800;font-size:17px">✖️ Multiplication</div><div class="muted" style="font-size:12px">Wooden dummy · best L'+(S.train.mult||0)+'/10</div></button>'+
     '<button class="tile" id="t-time"><div style="height:120px;display:grid;place-items:center;overflow:hidden">'+trainGearSVG("bag",false)+'</div>'+
       '<div style="font-weight:800;font-size:17px">🕐 Telling Time</div><div class="muted" style="font-size:12px">Punching bag · best L'+(S.train.time||0)+'/10</div></button>'+
    '</div></div>';
  $("back").onclick=function(){view="map";render();};
  $("t-mult").onclick=function(){TP={kind:"mult"};view="trainlvls";render();};
  $("t-time").onclick=function(){TP={kind:"time"};view="trainlvls";render();};
}
function screenTrainLevels(){
  var kind=TP.kind,info=TRAIN[kind],maxC=S.train[kind]||0,btns="";
  for(var L=1;L<=10;L++){var open=L<=maxC+1,done=L<=maxC;
    btns+='<button class="lvl" '+(open?'':'disabled')+' data-l="'+L+'">'+
      '<div class="e">'+(done?'✅':open?info.icon:'🔒')+'</div>'+
      '<div class="t">Level '+L+'</div>'+
      '<div class="b">'+trainQCount(L)+' Q · '+trainTime(kind,L)+'s'+(L===5||L===10?' · ❤️+1':'')+'</div></button>';}
  $("app").innerHTML='<div class="hud"><button class="btn sm ghost" id="back">⬅ Training</button>'+
    '<b>'+info.icon+' '+esc(info.name)+'</b><span class="pill">L'+maxC+'/10</span></div>'+
   '<div class="card" style="margin-top:12px"><p class="muted" style="font-size:13px;margin:0 0 12px">Clear a level to unlock the next. Levels 5 & 10 give +1 island heart.</p>'+
    '<div class="grid three">'+btns+'</div></div>';
  $("back").onclick=function(){view="train";render();};
  Array.prototype.forEach.call(document.querySelectorAll(".lvl"),function(b){if(b.disabled)return;
    b.onclick=function(){startTrain(kind,+b.getAttribute("data-l"));};});
}
function startTrain(kind,level){
  TP={kind:kind,level:level,total:trainQCount(level),qi:0,lives:3,correct:0,
      tSec:trainTime(kind,level),q:null,locked:false};
  view="trainplay";render();
}
// Island training centres (Dragon Dojo): fixed 10 questions, 10s each,
// 3 lives. Reuses the Training Dojo screens via isIslandCentre flag.
function startIslandTrain(kind){
  TP={kind:kind, level:1, total:10, qi:0, lives:3, correct:0,
      tSec:10, q:null, locked:false, isIslandCentre:true};
  view="trainplay"; render();
}
function screenTrainPlay(){
  var info=TRAIN[TP.kind];
  $("app").innerHTML='<div class="hud"><button class="btn sm ghost" id="quit">⬅ Quit</button>'+
    '<b>'+info.icon+' '+esc(info.name)+' · L'+TP.level+'</b><span class="pill star" id="tlife"></span></div>'+
   '<div class="stage" id="tstage" style="margin-top:12px;height:200px">'+
     '<div class="hpwrap"><div style="flex:1">Q <span id="tqi">1</span>/'+TP.total+'</div>'+
       '<div style="flex:1;text-align:right">Durability<div class="hpbar"><i id="tdur"></i></div></div></div>'+
     '<div class="floor"></div>'+
     '<div class="fighter hero idle" id="hero" style="width:74px;height:100px;left:9%">'+heroSVG()+'</div>'+
     '<div class="fighter idle" id="gear" style="right:9%;bottom:40px">'+trainCharSVG(TP.kind,122,false)+'</div>'+
   '</div><div class="card" id="tcard" style="margin-top:12px"></div>';
  $("quit").onclick=function(){clearInterval(tpTimer); view = TP.isIslandCentre ? "island" : "trainlvls"; render();};
  trainPaint();trainNext();
}
function trainPaint(){
  $("tlife").textContent="❤️ "+TP.lives;
  $("tqi").textContent=Math.min(TP.qi+1,TP.total);
  $("tdur").style.width=Math.max(0,((TP.total-TP.qi)/TP.total)*100)+"%";
}
// Normalized key for training-question dedup within a session. For
// multiplication (wingchun / mult) we treat "3 × 4" and "4 × 3" as the
// same question — commutative pair. Everything else falls back to a
// prompt+answer string key so no exact duplicates appear either.
function trainQKey(kind, q){
  if(kind==="wingchun" || kind==="mult"){
    var m = (q && q.prompt || "").match(/(\d+)\s*×\s*(\d+)/);
    if(m){ var a=+m[1], b=+m[2]; return "mult:"+Math.min(a,b)+"x"+Math.max(a,b); }
  }
  return String(q && q.prompt || "")+"|"+String(q && q.answer || "");
}
function trainNext(){
  clearInterval(tpTimer);
  if(TP.qi>=TP.total)return trainEnd(true);
  if(TP.lives<=0)return trainEnd(false);
  TP.locked=false;
  // Redraw until we get a question that hasn't been asked in this session.
  // 40 retries is well above the theoretical dedup ceiling for any current
  // training kind (Wing Chun has 15 unique commutative pairs in {2..6}).
  TP.seen = TP.seen || {};
  var tries=0, cand;
  do {
    cand = trainMakeQ(TP.kind, TP.level);
    var key = trainQKey(TP.kind, cand);
    tries++;
  } while(TP.seen[key] && tries<40);
  if(key) TP.seen[key] = true;
  TP.q = cand;
  var q = TP.q;
  var visual=q.clock?'<div class="qpic">'+clockSVG(q.clock.hour,q.clock.minute)+'</div>':'';
  $("tcard").innerHTML=visual+'<div class="qtext">'+esc(q.prompt)+'</div>'+
    '<div class="timerbar"><i id="tbar" style="width:100%"></i></div>'+
    '<div class="grid" id="topts">'+q.options.map(function(o,k){return '<button class="opt" data-k="'+k+'" data-v="'+esc(o)+'">'+esc(o)+'</button>';}).join("")+'</div>';
  Array.prototype.forEach.call(document.querySelectorAll("#topts .opt"),function(bn){bn.onclick=function(){trainAnswer(bn.getAttribute("data-v"),bn);};});
  var total=TP.tSec*1000,t0=Date.now(),bar=$("tbar");TP.qStart=t0;
  tpTimer=setInterval(function(){var left=Math.max(0,total-(Date.now()-t0));bar.style.width=(left/total*100)+"%";
    if(left<=0){clearInterval(tpTimer);if(!TP.locked)trainAnswer(" __to__",null);}},80);
}
function trainAnswer(given,btn){
  if(TP.locked)return;TP.locked=true;clearInterval(tpTimer);
  var q=TP.q,to=(given===" __to__"),ok=!to&&norm(given)===norm(q.answer);
  var el=Math.min(Math.max(0,Date.now()-(TP.qStart||Date.now())),TP.tSec*1000);
  if(!S.trainStats)S.trainStats={mult:{ans:0,ok:0,ms:0},time:{ans:0,ok:0,ms:0}};
  var TS=S.trainStats[TP.kind]||(S.trainStats[TP.kind]={ans:0,ok:0,ms:0});
  TS.ans++; if(ok)TS.ok++; TS.ms+=el; save();
  Array.prototype.forEach.call(document.querySelectorAll("#topts .opt"),function(b){
    if(norm(b.getAttribute("data-v"))===norm(q.answer))b.classList.add("good");
    else if(btn&&b===btn)b.classList.add("bad");b.disabled=true;});
  if(ok){TP.correct++;sfx("hit");anim("hero","doHeroHit");setTimeout(function(){anim("gear","doBossHurt");},150);}
  else{TP.lives--;sfx("miss");anim("gear","bSlam");setTimeout(function(){anim("hero","doHeroHurt");},150);
    var fx=document.createElement("div");fx.className="fx";fx.textContent=(to?"⏰":"❌")+" -1❤️";fx.style.color="#fca5a5";fx.style.left="12%";fx.style.bottom="110px";$("tstage").appendChild(fx);setTimeout(function(){fx.remove();},900);}
  TP.qi++;trainPaint();
  var msg=document.createElement("div");msg.style.cssText="text-align:center;font-weight:800;margin-top:10px;font-size:16px";
  msg.innerHTML=ok?'<span style="color:#16a34a">✅ Fast!</span>':'<span style="color:#ef4444">'+(to?'⏰ Too slow!':'❌')+' Answer: '+esc(q.answer)+'</span>';
  $("tcard").appendChild(msg);
  var win=(TP.qi>=TP.total&&TP.lives>0), fail=(TP.lives<=0), ended=win||fail;
  if(win){var ge=$("gear"); if(ge){
    ge.innerHTML=trainCharSVG(TP.kind,122,true);
    ge.classList.add("doBossHit");
  }}
  if(fail){var he=$("hero");if(he){he.className="fighter hero";void he.offsetWidth;he.classList.add("koHero");}}
  setTimeout(function(){ if(ended)trainEnd(win); else trainNext(); }, ok?620:(fail?1500:1100));
}
function trainEnd(won){
  clearInterval(tpTimer);
  var ms=[], coinsEarned=0, perfect=false, badgeEarned=null;
  if(won){
    if(TP.isIslandCentre){
      // Island centre: flat +20 coins. Perfect run (no wrong answers,
      // still at full lives) adds an extra +20 coins AND awards the
      // matching badge (chain_punch for Wing Chun, jab_cross for Boxing).
      coinsEarned = 20;
      perfect = (TP.lives === 3 && TP.correct === TP.total);
      if(perfect){
        coinsEarned += 20;
        var bid = TP.kind==="wingchun" ? "chain_punch"
                : TP.kind==="boxing"   ? "jab_cross" : null;
        if(bid && S.badges.indexOf(bid) < 0){
          S.badges.push(bid);
          badgeEarned = bid;
        }
      }
      S.coins = (S.coins||0) + coinsEarned;
    } else {
      if((S.train[TP.kind]||0)<TP.level)S.train[TP.kind]=TP.level;
      ms=trainMilestone(TP.kind,TP.level);
    }
    save();
  }
  TR_RESULT={won:won,kind:TP.kind,level:TP.level,correct:TP.correct,total:TP.total,
             lives:TP.lives,ms:ms,isIslandCentre:!!TP.isIslandCentre,
             coinsEarned:coinsEarned, perfect:perfect, badgeEarned:badgeEarned};
  view="trainresult";render();
}
function screenTrainResult(){
  var r=TR_RESULT,info=TRAIN[r.kind];
  var isCentre = r.isIslandCentre;
  var hasNext = !isCentre && r.won && r.level<10;
  var title = isCentre
    ? (r.won?'Training Complete!':'Training Failed')
    : (r.won?'Level '+r.level+' Cleared!':'Training Failed');
  $("app").innerHTML='<div class="center" style="min-height:80vh"><div class="card pop" style="max-width:460px;width:100%;text-align:center">'+
    '<div style="height:130px;display:grid;place-items:center">'+trainCharSVG(r.kind,110,r.won)+'</div>'+
    '<h1>'+esc(title)+'</h1>'+
    '<p style="font-weight:800">'+info.icon+' '+esc(info.name)+' — '+(r.won?esc(info.breakWord):'out of lives!')+'</p>'+
    '<div class="row" style="justify-content:center;gap:18px;margin:10px 0;font-weight:800">'+
      '<span style="color:#16a34a">✅ '+r.correct+'/'+r.total+'</span><span>❤️ '+r.lives+'</span></div>'+
    (isCentre && r.won && r.perfect ? '<div class="banner" style="background:#7c2d12;color:#fde047;font-weight:800">💯 PERFECT! Zero mistakes — Chain/Jab bonus unlocked.</div>' : '')+
    (isCentre && r.won && r.coinsEarned ? '<div class="banner" style="background:#15803d">🪙 +'+r.coinsEarned+' coins'+(r.perfect?' (20 base + 20 perfect bonus)':'')+'!</div>' : '')+
    (isCentre && r.won && r.badgeEarned ? '<div class="banner" style="background:#7c3aed;color:#fff;font-weight:800">🏅 NEW BADGE: '+esc(BADGES.filter(function(b){return b.id===r.badgeEarned;})[0].nm)+'</div>' : '')+
    (!isCentre && r.ms.length ? '<div class="banner" style="background:#15803d">🎉 Island Health +'+r.ms.length+'! Max hearts in island fights is now '+(3+(S.bonusHearts||0))+'.</div>' : '')+
    '<div class="wrap" style="justify-content:center;margin-top:16px">'+
      (hasNext?'<button class="btn green" id="next">▶ Level '+(r.level+1)+'</button>':'')+
      '<button class="btn" id="retry">🔁 Retry</button>'+
      '<button class="btn dark" id="menu">'+(isCentre?'🗺️ Back to Island':'🥋 Training')+'</button></div></div></div>';
  if(hasNext)$("next").onclick=function(){startTrain(r.kind,r.level+1);};
  $("retry").onclick=function(){ if(isCentre) startIslandTrain(r.kind); else startTrain(r.kind,r.level); };
  $("menu").onclick=function(){ if(isCentre){view="island";render();} else {TP={kind:r.kind};view="trainlvls";render();} };
}

function render(){
  if(view==="auth")return screenAuth();
  if(view==="profiles")return screenProfiles();
  if(view==="intro")return screenIntro();
  if(view==="map")return screenMap();
  if(view==="island")return screenIsland();
  if(view==="battle")return screenBattle();
  if(view==="result")return screenResult();
  if(view==="victory")return screenVictory();
  if(view==="shop")return screenShop();
  if(view==="wardrobe")return screenWardrobe();
  if(view==="badges")return screenBadges();
  if(view==="report")return screenReport();
  if(view==="train")return screenTrain();
  if(view==="trainlvls")return screenTrainLevels();
  if(view==="trainplay")return screenTrainPlay();
  if(view==="trainresult")return screenTrainResult();
  screenBoot();
}
function screenBoot(){
  // Gate the app on auth: if Firebase is configured and the user hasn't signed
  // in (and hasn't explicitly chosen offline), show the login screen first —
  // regardless of whether local progress exists. The "Continue without account"
  // button on the auth screen sets mathisland_skipauth=1 and lets them through.
  var skip=false; try{ skip=localStorage.getItem("mathisland_skipauth")==="1"; }catch(e){}
  if(fbConfigured() && !skip && !_authUser && _authReady){view="auth";return render();}
  // Returning player on this device with active profile → intro (once) → map.
  if(ROOT.current){
    if(!S.introSeen){view="intro";return render();}
    view="map";return render();
  }
  var profs=listProfiles();
  if(profs.length>0){view="profiles";return render();}
  // Offline mode chosen, or Firebase not configured: fall back to original splash.
  $("app").innerHTML='<div class="center" style="min-height:80vh">'+
   '<div style="font-size:70px" class="idle">🥋</div>'+
   '<h1 style="color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.25)">Maths Battle Quest</h1>'+
   '<p style="color:#fff;font-weight:800;max-width:540px">Train your mind. Sharpen your focus. Defeat the Maths Masters of Dragon Dojo Island.</p>'+
   '<div class="banner" style="margin:14px 0;max-width:540px">🔒 Progress saves on this device. Sign in to sync phone + tablet + PC.</div>'+
   '<button class="btn" id="go" style="font-size:20px;padding:16px 34px">Start — Create Player</button>'+
   (fbConfigured()?'<div style="height:8px"></div><button class="btn ghost sm" id="goAuth">🔑 Sign in / Sign up</button>':'')+
   '</div>';
  $("go").onclick=function(){view="profiles";render();};
  var ga=$("goAuth"); if(ga)ga.onclick=function(){try{localStorage.removeItem("mathisland_skipauth");}catch(e){}view="auth";render();};
}

  function paint(){

              : mode==="reset"  ? "Reset your password"

              : mode==="reset"  ? "We'll email you a link to set a new password."
              : "Sign in to sync your progress across devices.";
    var pwField = mode==="reset" ? "" :
      '<input class="ans-input" id="aPass" type="password" placeholder="Password (6+ characters)" autocomplete="'+(mode==="signup"?"new-password":"current-password")+'" style="width:100%;margin-top:10px"/>';
    var primary = mode==="signup" ? "Create account" : mode==="reset" ? "Send reset email" : "Sign in";
    var switcher = mode==="signin"
      ? '<button class="btn ghost sm" id="aSwitch">New here? Create an account</button><div style="height:6px"></div><button class="btn ghost sm" id="aReset">Forgot password?</button>'
      : '<button class="btn ghost sm" id="aSwitch">Have an account? Sign in</button>';
    $("app").innerHTML =

    var after=function(ok){
      if(!ok)return paint();

      toast(mode==="signup"?"🎉 Account created":"👋 Signed in");
      var c=getCloud(); c.code=em; c.auto=true; setCloud(c);
      // Fetch from BOTH the new UID path and the legacy email path, then pick
      // whichever has data (newest wins). This sidesteps the race where the
      // async migration hasn't yet copied legacy -> uid by the time we pull.
      var legPath = "saves/"+safePath(em);
      var done=function(rem){
        if(rem && rem.json && adoptCloud(rem)){

        var uidPath = "saves/"+_authUser.uid;
        fbDB.ref(uidPath).once("value").then(function(uSnap){
          var uVal=uSnap.val();

            var lVal=lSnap.val();

            if(uVal && uVal.json) best = uVal;

            done(best);

        },function(err){

          fbDB.ref(legPath).once("value").then(function(lSnap){done(lSnap.val());},function(){done(null);});
        });
      }
      if(fbInit()) pullUid(); else done(null);
    };
    if(mode==="signup")authSignUp(em,pw,after);

var B=null,qTimer=null;
function startBattle(islandN,topicIdx){
  var isl=ISLANDS[islandN-1],diff=isl.diff;
  var topic,boss,qs,hp,timer=0,dojoBg=null;
  if(topicIdx<0){
    topic={id:"Practice"}; boss={nm:"Practice Dummy",art:"dummy",col:"#b45309",mech:"basic"};
    qs=buildPractice(); hp=5;
  } else if(topicIdx===FINAL_IDX){
    var fb=FINAL_BOSSES[isl.n]||{nm:"Dragon King",art:"dragon",col:"#7f1d1d"};
    topic={id:"Dragon King Arena"};
    boss={nm:fb.nm,art:fb.art,col:fb.col,mech:"final"};
    qs=buildFinalBattle(diff); hp=10; // Wing spec: 10 lives for the Dragon King
    dojoBg = fb.bg || null;
    timer = 0; // Wing spec: no time limit on final boss
  } else {
    topic=TOPICS[topicIdx]; var en=enemyFor(islandN,topicIdx);
    boss={nm:en.nm,art:en.art,col:en.col,mech:"basic"};
    qs=buildBattle(topic.id,diff); hp=5; // Wing spec: 5 lives per dojo enemy
    dojoBg = (DOJOS[topicIdx] && DOJOS[topicIdx].bg) || null;
  }
  // Hearts come from the island life pool (3, or 4 if pizza eaten).
  var mh = S.islandMaxLives || 3;
  var startHearts = Math.max(1, Math.min(mh, S.islandLives||mh));
  B={isl:isl,diff:diff,topic:topic,boss:boss,topicIdx:topicIdx,qs:qs,qi:0,
     bossHP:hp,bossMax:hp,hearts:startHearts,maxHearts:mh,turn:0,locked:false,combo:0,perfect:true,
     correct:0,wrong:0,wrongStreak:0,subj:{},shieldUp:false,ragePending:false,intro:true,
     timer:timer, shieldTurns:[], dojoBg:dojoBg};
  // Wing spec: EVERY enemy (regular + final) gets 3 random shielded turns.
  // Pick from turns 2..end so the first turn is always landable.
  var pool=[];
  for(var k=2;k<=qs.length;k++)pool.push(k);
  B.shieldTurns=shuffle(pool).slice(0,3);
  view="battle";render();
}

function paintHP(){var mh=B.maxHearts||3;
  $("hearts").textContent="❤️".repeat(B.hearts)+"🖤".repeat(Math.max(0,mh-B.hearts));
  $("bhp").textContent="💜".repeat(Math.max(0,B.bossHP))+"🖤".repeat(Math.max(0,B.bossMax-B.bossHP));

  // and whether the hero has room to heal.
  var uk=document.getElementById("useKit");
  if(uk){
    var kits=S.firstAidKits||0;
    if(kits<=0){uk.style.display="none";return;}
    uk.textContent="🩹 Use Kit ("+kits+")";
    var canHeal = B.hearts < mh;
    uk.disabled = !canHeal;
    uk.style.opacity = canHeal ? "1" : "0.45";
  }
}

function answer(given,btn){
  if(B.locked)return;B.locked=true;clearInterval(qTimer);

  var timedOut=(given===" __timeout__");
  var ok=!timedOut && isCorrect(q,given);
  B.subj[q.topic]=B.subj[q.topic]||{tot:0,ok:0};B.subj[q.topic].tot++;if(ok)B.subj[q.topic].ok++;
  var ps=S.subjStats[q.topic]||{tot:0,ok:0};ps.tot++;if(ok)ps.ok++;S.subjStats[q.topic]=ps;
  S.totalAnswered++;
  if(!ok)S.mistakes.unshift({topic:q.topic,prompt:q.prompt,given:timedOut?"(time out)":given,correct:q.answer,when:Date.now()}),S.mistakes=S.mistakes.slice(0,30);
  Array.prototype.forEach.call(document.querySelectorAll("#opts .opt"),function(b){
    if(norm(b.getAttribute("data-v"))===norm(q.answer))b.classList.add("good");
    else if(btn&&b===btn)b.classList.add("bad");b.disabled=true;});
  if(ok){
    B.correct++;B.combo++;B.wrongStreak=0;S.combo=B.combo;if(B.combo>(S.bestCombo||0))S.bestCombo=B.combo;

      fxText("boss","-1","#fca5a5");

  }else{
    B.combo=0;S.combo=0;B.perfect=false;B.wrong++;B.wrongStreak++;
    sfx("miss");anim("boss",bossHitClass());setTimeout(function(){anim("hero","doHeroHurt");},180);
    B.hearts=Math.max(0,B.hearts-1);

  }
  save();paintHP();
  if(B.bossHP<=0){setTimeout(function(){var e=$("boss");if(e){e.className="fighter boss";void e.offsetWidth;e.classList.add("koBoss");}},520);}
  else if(B.hearts<=0){setTimeout(function(){var e=$("hero");if(e){e.className="fighter hero";void e.offsetWidth;e.classList.add("koHero");}},520);}
  var showHint=(!ok && B.wrongStreak>=3);if(showHint)B.wrongStreak=0;

    :'<div style="color:#ef4444;font-weight:800;font-size:19px">'+(timedOut?'⏰ Time out!':'❌ Not quite')+' — answer: '+esc(q.answer)+'</div>')

  $("qcard").appendChild(fb);

  var done=(B.bossHP<=0||B.hearts<=0||B.qi>=B.qs.length);
  var cont=document.createElement("button");cont.className="btn";cont.style.cssText="margin:14px auto 0;display:block";
  cont.textContent=done?"See Result ▶":"Continue ▶";

function endBattle(){
  clearInterval(qTimer);
  var isFinal=(B.boss.mech==="final");
  var won = isFinal ? (B.bossHP<=0) : ((B.bossHP<=0)||(B.hearts>0&&B.correct>=6));
  if(B.hearts<=0&&B.bossHP>0)won=false;
  var stars=0,coins=0,nb=[],scrollsDelta=0;
  if(won){
    S.totalWins=(S.totalWins||0)+1;
    stars=B.diff*4+(B.perfect?2:0);
    coins=30;                                  // Wing spec: flat +30 per win
    if(isFinal){ stars+=10; coins+=40; }
    S.stars+=stars;S.coins+=coins;
    // Replenish island life pool on every win.
    S.islandLives = S.islandMaxLives || 3;
    // Wing spec: each dojo win earns a scroll. Final boss too.
    scrollsDelta = +1;
    S.scrolls = (S.scrolls||0) + 1;
    if(B.topicIdx>=0 && !isFinal){
      S.cleared[B.isl.n+":"+B.topic.id]=true;
      S.islandWins[B.isl.n]=(S.islandWins[B.isl.n]||0)+1;
    }
    if(isFinal){
      S.finalCleared=S.finalCleared||{}; S.finalCleared[B.isl.n]=true;
      addBadge("dragon_black_belt",nb);
    }
  } else {
    // LOSE: −50 coins, −5 scrolls (min 0). Lives refill to max so the kid
    // can immediately try again (Wing spec). Cleared dojos stay cleared.
    coins = -50;
    S.coins = Math.max(0, (S.coins||0) - 50);
    scrollsDelta = -5;
    S.scrolls = Math.max(0, (S.scrolls||0) - 5);
    S.islandLives = S.islandMaxLives || 3;
  }
  S.history.unshift({when:Date.now(),island:B.isl.name,topic:B.topic.id,won:won,correct:B.correct,wrong:B.wrong});
  S.history=S.history.slice(0,20);S.lastPlay=todayKey();save();
  sfx(won?"win":"lose");
  RESULT={won:won,isl:B.isl,topic:B.topic,boss:B.boss,topicIdx:B.topicIdx,stars:stars,coins:coins,
    correct:B.correct,wrong:B.wrong,perfect:B.perfect,badges:nb,subj:B.subj,
    livesLeft:S.islandLives, maxLives:S.islandMaxLives, isFinal:isFinal,
    scrollsDelta:scrollsDelta, scrolls:S.scrolls};
  // Dragon King falls: show the victory screen the first time only.
  if(won && isFinal && !S.victorySeen){ S.victorySeen=true; save(); view="victory"; render(); return; }
  view="result";render();
}
