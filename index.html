    var data=JSON.stringify(ROOT);
    try{ if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(data); }catch(e){}
    try{ var a=document.createElement("a");
      a.href="data:application/json;charset=utf-8,"+encodeURIComponent(data);
      a.download="maths-island-backup.json";document.body.appendChild(a);a.click();a.remove(); }catch(e){}
    toast("💾 Backup downloaded + copied to clipboard");
  };
  $("rsF").onclick=function(){
    var inp=document.createElement("input");inp.type="file";inp.accept=".json,application/json,text/plain";
    inp.onchange=function(){var f=inp.files&&inp.files[0];if(!f)return;
      var r=new FileReader();r.onload=function(){applyBackup(String(r.result));};r.readAsText(f);};
    inp.click();
  };
  $("rsC").onclick=function(){var t=prompt("Paste your backup code here:");if(t&&t.trim())applyBackup(t.trim());};
  $("reset").onclick=function(){if(confirm("Reset ALL progress for '"+S.name+"'? This cannot be undone.")){var nm=S.name;S=defaultState();S.name=nm;save();toast("Progress reset");view="map";render();}};
  // Account buttons
  var aIn=$("aIn"); if(aIn)aIn.onclick=function(){try{localStorage.removeItem("mathisland_skipauth");}catch(e){}view="auth";render();};
  var aOut=$("aOut"); if(aOut)aOut.onclick=function(){if(!confirm("Sign out? Your cloud save stays safe — sign back in any time to restore it."))return;
    authSignOut(function(ok){if(ok){toast("👋 Signed out");try{localStorage.setItem("mathisland_skipauth","1");}catch(e){}view="map";render();}else toast("Sign out failed: "+(_lastAuthErr||"unknown"));});};
  // Legacy cloud-code controls only exist when signed out
  if(!_authUser){
    var ccStatus=function(){var e=$("ccStat");if(!e)return;
      var base = !fbConfigured() ? "Cloud not set up." :
        (!fbInit() ? "Cloud offline — no internet?" :
        (getCloud().code ? ("Synced as: "+getCloud().code+(getCloud().auto!==false?" · auto-save ON":" · auto-save OFF")) : "Enter a Cloud Code to turn on cloud save."));
      e.textContent = base + (_lastCloudErr ? "  ⚠ "+_lastCloudErr : "");};
    ccStatus();
    $("ccSet").onclick=function(){var v=$("cc").value.trim();if(!v){toast("Enter a cloud code first");return;}
      var c=getCloud();c.code=v;c.auto=true;setCloud(c);
      if(!fbInit()){toast("Cloud offline — check internet");ccStatus();return;}
      cloudPull(function(rem){var lt=+(localStorage.getItem(TS_KEY)||0);
        if(rem&&rem.json&&(rem.t||0)>lt&&adoptCloud(rem)){toast("☁️ Loaded your cloud save");view="map";render();}
        else{cloudPush(function(ok){toast(ok?"☁️ Cloud sync is ON":("Cloud save failed: "+(_lastCloudErr||"unknown")));ccStatus();});}});};
    $("ccUp").onclick=function(){if(!getCloud().code){toast("Set a cloud code first");return;}
      cloudPush(function(ok){toast(ok?"⬆ Saved to cloud":("Cloud save failed: "+(_lastCloudErr||"unknown")));ccStatus();});};
    $("ccDn").onclick=function(){if(!getCloud().code){toast("Set a cloud code first");return;}
      cloudPull(function(rem){if(rem&&rem.json&&adoptCloud(rem)){toast("⬇ Loaded — reloading…");setTimeout(function(){location.reload();},700);}else toast("No cloud save found for that code");});};
    $("ccAuto").onclick=function(){var c=getCloud();c.auto=(c.auto===false);setCloud(c);toast("Auto-sync "+(c.auto!==false?"ON":"OFF"));render();};
  }
}
// Hardware back button: navigate views instead of closing the app/tab.
// Wraps render() so every view change pushes a history entry, then listens
// for popstate to restore the previous view. Mid-battle back behaves like
// the Flee button so remaining hearts carry to the island life pool.
(function(){
  var _origRender = render;
  var _fromPop = false;
  var _lastPushed = null;
  render = function(){
    _origRender();
    if(_fromPop) return;
    if(view === _lastPushed) return;
    try { history.pushState({view:view}, ''); _lastPushed = view; } catch(e){}
  };
  window.addEventListener('popstate', function(e){
    // Mid-battle back = Flee (carry remaining hearts to island pool).
    if(view==="battle" && B){
      try { clearInterval(qTimer); } catch(_){}
      S.islandLives = Math.max(0, B.hearts|0);
      save();
      toast("🏳️ Fled — lives now "+S.islandLives+"/"+(S.islandMaxLives||3));
    }
    _fromPop = true;
    // Wing spec: hardware back jumps straight to the menu (map) from any
    // gameplay screen — not the previous view in history. Auth / intro
    // screens are exempt so back closes the app on a fresh device.
    if(view==="auth" || view==="intro" || view==="map"){
      if(e.state && e.state.view){ view = e.state.view; _lastPushed = view; }
    } else {
      view = "map";
      _lastPushed = "map";
      try { history.replaceState({view:"map"}, ""); } catch(_){}
    }
    render();
    _fromPop = false;
  });
  // Seed the initial history entry so the very first back press has somewhere
  // to land instead of closing the PWA.
  try { history.replaceState({view: view||'boot'}, ''); _lastPushed = view||'boot'; } catch(e){}
})();

fbInit();
render();
// Wait for Firebase Auth to resolve (it persists previous sessions) before
// touching the cloud, so signed-in users hit the UID-keyed path, not the
// legacy email path. If Firebase is offline / blocked, this short-circuits.
fbAuthInit(function(){ bootCloudSync(); });
</script>
